<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KanbanCintia — Gerencie seus projetos com quadros, colunas e cards ao estilo Trello." />
  <title>KanbanCintia — Seu Gerenciador de Projetos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header" id="app-header">
    <div class="header-inner">
      <button class="logo-btn" id="btn-home" title="Ir para Home" aria-label="Ir para a página inicial">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="12" height="12" rx="3" fill="currentColor" opacity=".9"/>
          <rect x="16" width="12" height="12" rx="3" fill="currentColor" opacity=".7"/>
          <rect y="16" width="12" height="12" rx="3" fill="currentColor" opacity=".7"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="currentColor" opacity=".5"/>
        </svg>
        <span class="logo-text">KanbanCintia</span>
      </button>
      <div class="header-actions" id="header-actions"></div>
    </div>
  </header>
  <main id="app" role="main" aria-label="Área principal do aplicativo"></main>
  <!-- MODAL DE EDIÇÃO DE CARD -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-card-title" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-card-title">Editar Card</h2>
        <button class="modal-close-btn" id="modal-close-btn" title="Fechar modal" aria-label="Fechar modal">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-color-strip" id="modal-color-strip"></div>
        <div class="form-group">
          <label for="modal-input-title" class="form-label">Título</label>
          <input type="text" id="modal-input-title" class="form-input" placeholder="Título do card..." maxlength="120" />
        </div>
        <div class="form-group">
          <label for="modal-input-desc" class="form-label">Descrição</label>
          <textarea id="modal-input-desc" class="form-textarea" rows="4" placeholder="Adicione uma descrição detalhada..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Cor do Card</label>
          <div class="color-picker-row" id="color-picker-row" role="group" aria-label="Selecionar cor do card"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Etiquetas (Labels)</label>
          <div class="label-color-presets" id="label-color-presets" role="group" aria-label="Cores predefinidas de etiqueta"></div>
          <div class="labels-input-row">
            <input type="text" id="modal-input-label" class="form-input" placeholder="Nova etiqueta..." maxlength="40" />
            <input type="color" id="modal-input-label-color" class="label-color-input" value="#6366f1" title="Cor da etiqueta" aria-label="Cor da etiqueta" />
            <button class="btn btn-secondary" id="btn-add-label" type="button">Adicionar</button>
          </div>
          <div class="labels-list" id="modal-labels-list" role="list" aria-label="Lista de etiquetas"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger-outline" id="modal-delete-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 4h12M6 4V2h4v2M5 4v9a1 1 0 001 1h4a1 1 0 001-1V4H5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Excluir Card
        </button>
        <button class="btn btn-primary" id="modal-save-btn" type="button">Salvar Alterações</button>
      </div>
    </div>
  </div>
  <!-- MODAL DE INPUT GENÉRICO -->
  <div class="modal-overlay" id="input-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="input-modal-title" hidden>
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2 class="modal-title" id="input-modal-title">Adicionar</h2>
        <button class="modal-close-btn" id="input-modal-close-btn" aria-label="Fechar modal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M13 5L5 13M5 5l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" id="input-modal-label">Nome</label>
          <input type="text" id="input-modal-field" class="form-input" autocomplete="off" maxlength="120" />
        </div>
      </div>
      <div class="modal-footer modal-footer--end">
        <button class="btn btn-secondary" id="input-modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="input-modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>
  <!-- MODAL DE CONFIRMAÇÃO -->
  <div class="modal-overlay" id="confirm-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title" hidden>
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2 class="modal-title" id="confirm-modal-title">Confirmar</h2>
      </div>
      <div class="modal-body">
        <p class="confirm-modal-message" id="confirm-modal-message"></p>
      </div>
      <div class="modal-footer modal-footer--end">
        <button class="btn btn-secondary" id="confirm-modal-cancel">Cancelar</button>
        <button class="btn btn-danger" id="confirm-modal-confirm">Excluir</button>
      </div>
    </div>
  </div>
  <script src="js/board.js"></script>
  <script src="js/column.js"></script>
  <script src="js/card.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
